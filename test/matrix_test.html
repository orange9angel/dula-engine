<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Matrix Animation Test</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }
    canvas { display: block; }
    #info {
      position: absolute; top: 10px; left: 10px;
      color: #0f0; font-family: monospace; font-size: 14px;
      background: rgba(0,0,0,0.7); padding: 10px; border-radius: 4px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="info">Loading...</div>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
      "dula-engine": "../index.js"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { CharacterBase } from '../characters/CharacterBase.js';
    import { AnimationBase, PoseMatrix } from '../animations/index.js';

    // ========== SCENE SETUP ==========
    const width = 1920;
    const height = 1080;
    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setSize(width, height);
    renderer.setPixelRatio(1);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
    camera.position.set(3, 2.0, 3);  // side view to see arm rotation
    camera.lookAt(0, 1.0, 0);

    // Lights
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(3, 5, 3);
    dirLight.castShadow = true;
    scene.add(dirLight);

    // Ground
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(20, 20),
      new THREE.MeshStandardMaterial({ color: 0x333344 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    // Grid
    scene.add(new THREE.GridHelper(20, 20, 0x555566, 0x444455));

    // ========== TEST CHARACTER ==========
    class TestCharacter extends CharacterBase {
      constructor() {
        super('TestChar');
      }
      build() {
        const skinMat = new THREE.MeshToonMaterial({ color: 0xe8b890 });
        const shirtMat = new THREE.MeshToonMaterial({ color: 0x2a5a3a });
        const pantsMat = new THREE.MeshToonMaterial({ color: 0x1a3c8a });
        const hairMat = new THREE.MeshToonMaterial({ color: 0x1a1a1a });

        // Head
        const headGroup = new THREE.Group();
        headGroup.position.y = 1.72;
        const face = new THREE.Mesh(new THREE.SphereGeometry(0.27, 16, 16), skinMat);
        face.castShadow = true;
        headGroup.add(face);
        this.headGroup = headGroup;
        this.mesh.add(headGroup);

        // Body
        const body = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.18, 0.6, 16), shirtMat);
        body.position.y = 1.16;
        body.castShadow = true;
        this.mesh.add(body);

        // FLAT ARM (like old Doraemon/Nobita - will be auto-adapted by RigAdapter)
        const addArm = (sx, isRight) => {
          const armGroup = new THREE.Group();
          armGroup.position.set(sx, 1.35, 0);

          // Upper arm
          const upperArm = new THREE.Mesh(new THREE.CapsuleGeometry(0.065, 0.22, 4, 8), skinMat);
          upperArm.position.y = -0.11;
          armGroup.add(upperArm);

          // Forearm
          const forearm = new THREE.Mesh(new THREE.CapsuleGeometry(0.06, 0.2, 4, 8), skinMat);
          forearm.position.y = -0.36;
          armGroup.add(forearm);

          // Hand
          const hand = new THREE.Mesh(new THREE.SphereGeometry(0.065, 8, 8), skinMat);
          hand.position.y = -0.52;
          armGroup.add(hand);

          this.mesh.add(armGroup);
          if (isRight) {
            this.rightArm = armGroup;
            this.rightArmLength = 0.52;
            this.rightArmBaseZ = 0;
          } else {
            this.leftArm = armGroup;
            this.leftArmBaseZ = 0;
          }
        };
        addArm(-0.28, false);
        addArm(0.28, true);

        // FLAT LEG (will be auto-adapted)
        const addLeg = (sx, isRight) => {
          const legGroup = new THREE.Group();
          legGroup.position.set(sx, 0.62, 0);

          const thigh = new THREE.Mesh(new THREE.CapsuleGeometry(0.08, 0.24, 4, 8), pantsMat);
          thigh.position.y = -0.12;
          legGroup.add(thigh);

          const shin = new THREE.Mesh(new THREE.CapsuleGeometry(0.07, 0.22, 4, 8), pantsMat);
          shin.position.y = -0.36;
          legGroup.add(shin);

          const shoe = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 8), new THREE.MeshToonMaterial({ color: 0x333333 }));
          shoe.position.set(0, -0.5, 0.03);
          shoe.scale.set(1, 0.6, 1.4);
          legGroup.add(shoe);

          this.mesh.add(legGroup);
          if (isRight) this.rightLeg = legGroup;
          else this.leftLeg = legGroup;
        };
        addLeg(-0.12, false);
        addLeg(0.12, true);
      }
    }

    // ========== MATRIX ANIMATIONS ==========
    class TestPunch extends AnimationBase {
      constructor() {
        super('Punch', 1.2);
        this.usePoseMatrix = true;
      }
      getPoseMatrix(t) {
        const pose = new PoseMatrix();
        if (t < 0.2) {
          // Windup: pull right arm back, elbow bends
          const p = t / 0.2;
          const ease = p * p;
          pose.rightShoulder = { rz: -ease * 0.5, rx: -ease * 0.8 };
          pose.rightElbow = { rx: -ease * 2.0 };     // elbow bends back sharply
          pose.rightWrist = { rz: -ease * 0.3 };
          pose.leftShoulder = { rz: ease * 0.3, rx: -ease * 0.4 };
          pose.leftElbow = { rx: -ease * 1.0 };
          pose.mesh = { y: -ease * 0.08 };
          pose.headGroup = { ry: -ease * 0.1 };
        } else if (t < 0.5) {
          // Punch: arm extends forward
          const p = (t - 0.2) / 0.3;
          const ease = 1 - Math.pow(1 - p, 3);
          pose.rightShoulder = { rz: -0.5 + ease * 1.2, rx: -0.8 - ease * 1.5 };
          pose.rightElbow = { rx: -2.0 + ease * 2.2 };  // elbow straightens
          pose.rightWrist = { rz: -0.3 + ease * 0.5 };
          pose.leftShoulder = { rz: 0.3 - ease * 0.1, rx: -0.4 - ease * 0.3 };
          pose.leftElbow = { rx: -1.0 - ease * 0.3 };
          pose.mesh = { x: ease * 0.4, y: -0.08 + ease * 0.08 };
          pose.headGroup = { ry: -0.1 + ease * 0.2 };
        } else {
          // Recovery
          const p = (t - 0.5) / 0.7;
          const ease = p * p;
          pose.rightShoulder = { rz: 0.7 - ease * 0.9, rx: -2.3 + ease * 1.0 };
          pose.rightElbow = { rx: 0.2 - ease * 1.2 };
          pose.rightWrist = { rz: 0.2 - ease * 0.2 };
          pose.leftShoulder = { rz: 0.2 + ease * 0.1, rx: -0.7 + ease * 0.3 };
          pose.leftElbow = { rx: -1.3 + ease * 0.5 };
          pose.mesh = { x: 0.4 * (1 - ease) };
          pose.headGroup = { ry: 0.1 * (1 - ease) };
        }
        return pose;
      }
    }

    class TestKick extends AnimationBase {
      constructor() {
        super('Kick', 1.0);
        this.usePoseMatrix = true;
      }
      getPoseMatrix(t) {
        const pose = new PoseMatrix();
        if (t < 0.25) {
          const p = t / 0.25;
          const ease = p * p;
          pose.rightHip = { rx: -ease * 1.0 };
          pose.rightKnee = { rx: ease * 1.2 };
          pose.leftHip = { rx: ease * 0.1 };
          pose.leftKnee = { rx: ease * 0.2 };
          pose.rightShoulder = { rz: -ease * 0.5, rx: -ease * 0.3 };
          pose.leftShoulder = { rz: ease * 0.5, rx: -ease * 0.3 };
        } else if (t < 0.5) {
          const p = (t - 0.25) / 0.25;
          const ease = 1 - Math.pow(1 - p, 2);
          pose.rightHip = { rx: -1.0 + ease * 0.3 };
          pose.rightKnee = { rx: 1.2 - ease * 1.2 };
          pose.leftHip = { rx: 0.1 };
          pose.leftKnee = { rx: 0.2 };
          pose.mesh = { x: ease * 0.2 };
        } else {
          const p = (t - 0.5) / 0.5;
          const ease = p * p;
          pose.rightHip = { rx: -0.7 - ease * 0.2 };
          pose.rightKnee = { rx: ease * 0.5 };
          pose.leftHip = { rx: 0.1 - ease * 0.1 };
          pose.leftKnee = { rx: 0.2 - ease * 0.2 };
          pose.mesh = { x: 0.2 * (1 - ease) };
        }
        return pose;
      }
    }

    // ========== CREATE CHARACTER ==========
    const char = new TestCharacter();
    char.setPosition(0, 0, 0);
    scene.add(char.mesh);

    // Visualize joint hierarchy with colored spheres at pivot points
    const jointColors = {
      rightArm: 0xff0000, rightElbow: 0xff8800, rightWrist: 0xffff00,
      leftArm: 0x00ff00, leftElbow: 0x88ff00, leftWrist: 0x00ffff,
      rightLeg: 0x0000ff, rightKnee: 0x0088ff, rightAnkle: 0xff00ff,
      leftLeg: 0xff0088, leftKnee: 0xff88ff, leftAnkle: 0xffffff,
    };

    function visualizeJoints() {
      for (const [key, color] of Object.entries(jointColors)) {
        const joint = char[key];
        if (joint && !joint.userData.visualized) {
          const vis = new THREE.Mesh(
            new THREE.SphereGeometry(0.035, 8, 8),
            new THREE.MeshBasicMaterial({ color, wireframe: false, transparent: true, opacity: 0.8 })
          );
          joint.add(vis);
          joint.userData.visualized = true;
        }
      }
    }
    visualizeJoints();

    // Add axis helpers to key joints
    function addAxisHelpers() {
      const axesSize = 0.15;
      for (const key of ['rightArm', 'rightElbow', 'rightLeg', 'rightKnee']) {
        const joint = char[key];
        if (joint && !joint.userData.hasAxes) {
          const axes = new THREE.AxesHelper(axesSize);
          joint.add(axes);
          joint.userData.hasAxes = true;
        }
      }
    }
    addAxisHelpers();

    // ========== ANIMATION STATE ==========
    let currentAnim = 'punch';
    let animTime = 0;
    const animDuration = 1.0;

    // Play initial animation
    char.playAnimation(TestPunch, 0, animDuration);

    // ========== RENDER LOOP ==========
    const info = document.getElementById('info');
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const delta = clock.getDelta();
      animTime += delta;

      // Loop animation
      if (animTime > animDuration + 0.5) {
        animTime = 0;
        char.clearAnimations();
        if (currentAnim === 'punch') {
          char.playAnimation(TestKick, 0, animDuration);
          currentAnim = 'kick';
        } else {
          char.playAnimation(TestPunch, 0, animDuration);
          currentAnim = 'punch';
        }
      }

      // Update character
      char.update(animTime, delta);

      // Update info
      const amc = char._actionMatrix;
      info.innerHTML = `
        <b>Matrix Animation Test</b><br>
        Animation: ${currentAnim.toUpperCase()}<br>
        Time: ${animTime.toFixed(2)}s / ${animDuration}s<br>
        Phase: ${amc ? amc.currentPhase : 'none'}<br>
        <br>
        <b>Joint Hierarchy (RigAdapter)</b><br>
        rightArm → rightElbow → rightWrist: ${char.rightWrist?.parent === char.rightElbow ? 'OK' : 'FAIL'}<br>
        rightLeg → rightKnee → rightAnkle: ${char.rightAnkle?.parent === char.rightKnee ? 'OK' : 'FAIL'}<br>
        leftArm → leftElbow → leftWrist: ${char.leftWrist?.parent === char.leftElbow ? 'OK' : 'FAIL'}<br>
        leftLeg → leftKnee → leftAnkle: ${char.leftAnkle?.parent === char.leftKnee ? 'OK' : 'FAIL'}<br>
        <br>
        <b>Joint Rotations</b><br>
        rightArm rx: ${char.rightArm?.rotation.x.toFixed(2)} rz: ${char.rightArm?.rotation.z.toFixed(2)}<br>
        rightElbow rx: ${char.rightElbow?.rotation.x.toFixed(2)}<br>
        rightWrist rx: ${char.rightWrist?.rotation.x.toFixed(2)}<br>
        rightHip rx: ${char.rightHip?.rotation.x.toFixed(2)}<br>
        rightKnee rx: ${char.rightKnee?.rotation.x.toFixed(2)}<br>
      `;

      renderer.render(scene, camera);
    }

    animate();

    // Expose for screenshot
    window.getScreenshot = () => renderer.domElement.toDataURL('image/jpeg', 0.92);
  </script>
</body>
</html>
